---
# Checkov configuration for aliasaurus IaC.
# Documents deliberate exceptions for the Function App that serves the web UI.
skip-check:
  # Easy Auth is configured via the authsettingsV2 resource (conditional on
  # authClientId); the app also enforces an owner check in code.
  - CKV_AZURE_13
  # Storage access uses the managed identity (AzureWebJobsStorage__accountName).
  # A content file-share connection string would reintroduce a stored secret,
  # which violates the project's no-secrets / managed-identity principle.
  - CKV_AZURE_88
  # This is an internet-facing web app for the owner (gated by Entra Easy Auth);
  # disabling public network access would defeat its purpose.
  - CKV_AZURE_222
  # ".NET Framework version" check is not applicable to a PowerShell Function app.
  - CKV_AZURE_84

# Tool versions for this repository, pinned and Renovate-managed (mise manager).
# The lint tools feed the shared lint workflow
# (DevSecNinja/.github .github/workflows/lint.yml), which installs from this
# config and fails with guidance if a tool it needs is not pinned here.
[tools]
uv = "latest"
dprint = "0.55.1"
yamlfmt = "0.21.0"
actionlint = "1.7.12"
gitleaks = "8.30.1"
shellcheck = "0.11.0"
shfmt = "3.13.1"
trivy = "0.72.0"
zizmor = "1.26.1"
"pipx:yamllint" = "1.38.0"
"pipx:checkov" = "3.3.6"

[tasks.test]
description = "Run Pester unit tests"
run = "pwsh -NoProfile -File ./build/Invoke-Tests.ps1"

[tasks.lint]
description = "Run PSScriptAnalyzer over the codebase"
run = "pwsh -NoProfile -File ./build/Invoke-Lint.ps1"

[tasks.dev]
description = "Run the local mock dev server to preview the web UI"
run = "pwsh -NoProfile -File ./build/Start-DevServer.ps1"
